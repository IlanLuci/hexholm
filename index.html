<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Hexholm — Free Online Multiplayer Catan-Style Strategy Game</title>
    <meta
      name="description"
      content="Play Hexholm free in your browser — a real-time multiplayer Catan-style strategy game. Build settlements and cities, trade resources, block rivals with the robber, and race to 10 victory points against friends or AI bots. No download, no signup."
    />
    <meta name="theme-color" content="#20323C" />
    <link rel="canonical" href="https://hexholm.nimbler.workers.dev/" />

    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- Open Graph / link previews -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Hexholm" />
    <meta property="og:title" content="Hexholm — Build. Trade. Outwit the island." />
    <meta
      property="og:description"
      content="A free real-time multiplayer Catan-style strategy game. Build, trade, and outwit rivals to 10 victory points — with friends or AI bots, right in your browser."
    />
    <meta property="og:url" content="https://hexholm.nimbler.workers.dev/" />
    <meta property="og:image" content="https://hexholm.nimbler.workers.dev/og-image.svg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Hexholm — Build. Trade. Outwit the island." />
    <meta
      name="twitter:description"
      content="A free real-time multiplayer Catan-style strategy game. Play with friends or AI bots, right in your browser."
    />
    <meta name="twitter:image" content="https://hexholm.nimbler.workers.dev/og-image.svg" />

    <!-- Structured data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "VideoGame",
        "name": "Hexholm",
        "url": "https://hexholm.nimbler.workers.dev/",
        "description": "A free real-time multiplayer Catan-style strategy game. Build settlements and cities, trade resources, and race to 10 victory points against friends or AI bots.",
        "genre": ["Strategy", "Board Game", "Multiplayer"],
        "gamePlatform": "Web Browser",
        "applicationCategory": "Game",
        "operatingSystem": "Any",
        "playMode": "MultiPlayer",
        "numberOfPlayers": { "@type": "QuantitativeValue", "minValue": 2, "maxValue": 4 },
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
      }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Zilla+Slab:wght@500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      * { box-sizing: border-box; }
      html, body, #root { margin: 0; padding: 0; height: 100%; }
      body {
        font-family: "Manrope", system-ui, sans-serif;
        color: #241b10;
        -webkit-font-smoothing: antialiased;
        background: #ede3cf;
      }
      .hh-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
      .hh-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,.16); border-radius: 2px; }
      @keyframes hhpop { 0% { transform: scale(.2); opacity: 0; } 60% { transform: scale(1.14); } 100% { transform: scale(1); opacity: 1; } }
      @keyframes hhfloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
      @keyframes hhfadeup { 0% { transform: translateY(8px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
      @keyframes hhshake { 0%,100% { transform: rotate(0); } 20% { transform: rotate(-14deg); } 40% { transform: rotate(12deg); } 60% { transform: rotate(-8deg); } 80% { transform: rotate(5deg); } }
      @keyframes hhtoast { 0% { transform: translate(-50%, -10px); opacity: 0; } 12%,88% { transform: translate(-50%, 0); opacity: 1; } 100% { transform: translate(-50%, -10px); opacity: 0; } }
      /* SVG pieces animate around their own centre when they first appear */
      .hh-appear { transform-box: fill-box; transform-origin: center; animation: hhpop .32s ease both; }
      .hh-fadeup { animation: hhfadeup .28s ease both; }
      .hh-die-roll { animation: hhshake .5s ease; }
      @keyframes hhdelta { 0% { transform: translate(-50%, 4px); opacity: 0; } 18% { opacity: 1; } 100% { transform: translate(-50%, -24px); opacity: 0; } }
      @keyframes hhdeltapop { 0% { transform: translate(-50%, 8px) scale(.5); opacity: 0; } 16% { transform: translate(-50%, 0) scale(1.25); opacity: 1; } 32% { transform: translate(-50%, -2px) scale(1); opacity: 1; } 74% { transform: translate(-50%, -6px) scale(1); opacity: 1; } 100% { transform: translate(-50%, -34px) scale(1); opacity: 0; } }
      @keyframes hhgain { 0%,100% { box-shadow: 0 3px 9px rgba(0,0,0,.3), inset 0 1px 0 rgba(255,255,255,.16); } 35% { box-shadow: 0 0 0 3px rgba(143,191,106,.95), 0 4px 14px rgba(143,191,106,.55); } }
      @keyframes hhloss { 0%,100% { box-shadow: 0 3px 9px rgba(0,0,0,.3), inset 0 1px 0 rgba(255,255,255,.16); } 35% { box-shadow: 0 0 0 3px rgba(206,92,64,.95), 0 4px 14px rgba(206,92,64,.55); } }
      .hh-gain { animation: hhgain .9s ease; }
      .hh-loss { animation: hhloss .9s ease; }
      @keyframes hhcardpulse { 0%,100% { box-shadow: none; } 40% { box-shadow: 0 0 0 2px rgba(217,164,65,.8); } }
      .hh-pulse { animation: hhcardpulse .8s ease; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/client/main.tsx"></script>
  </body>
</html>
