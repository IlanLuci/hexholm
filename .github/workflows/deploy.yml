name: Deploy to Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch: {} # allow manual runs from the Actions tab

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Type-check and run the rules-engine / server test suite before shipping.
      - run: npm run typecheck
      - run: npm test

      # Build the client (Vite) so wrangler can upload dist/client as assets.
      - run: npm run build

      - name: Deploy Worker + Durable Objects
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: deploy
